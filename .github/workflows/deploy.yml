name: Deploy to GitHub Pages + Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        shell: bash
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Add Android platform
        run: npx cap add android

      - name: Build web + copy to Capacitor
        run: npm run build:android

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Smart_Lecture_v1.0.0_${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart_Lecture_v1.0.0_${{ github.run_number }}
          path: Smart_Lecture_v1.0.0_${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Smart Lecture v1.0.0 (Build ${{ github.run_number }})
          body: |
            ## Smart Lecture v1.0.0 (Build ${{ github.run_number }})

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message || 'Manual trigger' }}

            ### Download
            - [Smart_Lecture_v1.0.0_${{ github.run_number }}.apk](https://github.com/${{ github.repository }}/releases/download/v1.0.0-${{ github.run_number }}/Smart_Lecture_v1.0.0_${{ github.run_number }}.apk)
          files: Smart_Lecture_v1.0.0_${{ github.run_number }}.apk
          generate_release_notes: true
