name: 🚀 Deploy Web + Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        shell: bash
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "$SDK/platform-tools" >> $GITHUB_PATH
          echo "$SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept SDK licenses
        shell: bash
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build web + copy to Capacitor
        run: npm run build:android

      - name: Build APK
        shell: bash
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Smart_Lecture_v1.0.0_${{ github.run_number }}.apk
          echo "### Smart Lecture v1.0.0 (Build ${{ github.run_number }})" > release/notes.md
          echo "" >> release/notes.md
          echo "**Commit:** \`${{ github.sha }}\`" >> release/notes.md
          echo "**Message:** ${{ github.event.head_commit.message || 'Manual trigger' }}" >> release/notes.md

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart_Lecture_v1.0.0_${{ github.run_number }}
          path: release/Smart_Lecture_v1.0.0_${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Smart Lecture v1.0.0 (Build ${{ github.run_number }})
          body_path: release/notes.md
          files: release/Smart_Lecture_v1.0.0_${{ github.run_number }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
